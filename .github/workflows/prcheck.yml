name: PR Quality Check

# 触发条件：当有针对 main/master 分支的 PR 时触发。
# 默认行为：PR 创建、重新打开，以及 PR 分支上的每次 push 都会触发此检查。
on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.10' # 严格锁定 Python 3.12.10

      # 1. 运行 Black 检查代码格式
      - name: Check formatting with Black
        uses: psf/black@stable
        with:
          options: "--check --verbose"

      # 2. 运行 Ruff 检查语法和潜在 Bug
      - name: Lint with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"
