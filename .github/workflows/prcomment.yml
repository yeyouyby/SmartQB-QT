name: Hide Outdated PR Comments

# 触发条件：只有在向已存在的 PR 推送新 commits 时才触发
on:
  pull_request_target:
    types: [synchronize]

# 必须赋予操作 PR 和评论的写权限
permissions:
  pull-requests: write
  issues: write

jobs:
  fold-all-previous-comments:
    runs-on: ubuntu-latest
    steps:
      - name: Fold all comments before this push
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`正在扫描 PR #${prNumber} 中的旧评论...`);

            // 1. 获取所有的全局普通评论 (Issue Comments)
            const { data: issueComments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });

            // 2. 获取所有的代码行审查评论 (Review Comments)
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner,
              repo,
              pull_number: prNumber,
            });

            // 提取所有评论的 Node ID
            const allNodeIds = [
              ...issueComments.map(c => c.node_id),
              ...reviewComments.map(c => c.node_id)
            ];

            console.log(`共找到 ${allNodeIds.length} 条历史评论，准备折叠...`);

            // 定义 GraphQL Mutation，将状态标记为 OUTDATED (已过期)
            const mutation = `
              mutation($subjectId: ID!) {
                minimizeComment(input: {classifier: OUTDATED, subjectId: $subjectId}) {
                  minimizedComment {
                    isMinimized
                  }
                }
              }
            `;

            // 遍历并折叠每一个评论
            let successCount = 0;
            for (const id of allNodeIds) {
              try {
                await github.graphql(mutation, { subjectId: id });
                successCount++;
              } catch (error) {
                // 如果评论已经被折叠，或者因为权限原因无法折叠（比如是其他 App 生成的某些特殊评论），则跳过
                console.log(`跳过节点 ID ${id}: 可能已被折叠或无法修改。`);
              }
            }
            
            console.log(`执行完毕！成功折叠了 ${successCount} 条过期评论。`);
