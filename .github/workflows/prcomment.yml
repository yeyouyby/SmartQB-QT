name: Hide Outdated PR Comments

# 触发条件：当 PR 有新的代码推送 (synchronize) 时触发
on:
  pull_request_target:
    types: [synchronize]

# 必须赋予 Actions 修改 PR 和评论的权限
permissions:
  pull-requests: write
  issues: write

jobs:
  hide-outdated-comments:
    runs-on: ubuntu-latest
    steps:
      - name: Hide outdated comments via GitHub Script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 获取当前 PR 下所有的评论
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            // 遍历并调用 GraphQL API 将它们折叠并标记为 OUTDATED
            for (const comment of comments) {
              const query = `
                mutation {
                  minimizeComment(input: {classifier: OUTDATED, subjectId: "${comment.node_id}"}) {
                    minimizedComment {
                      isMinimized
                    }
                  }
                }
              `;
              try {
                await github.graphql(query);
                console.log(`成功折叠过期的评论 ID: ${comment.id}`);
              } catch (error) {
                console.log(`跳过评论 ${comment.id}: 可能已经被折叠或由于权限原因无法修改。`);
              }
            }
