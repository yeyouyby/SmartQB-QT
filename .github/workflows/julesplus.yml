name: Ultimate CI/CD & PR Orchestrator

# 监听四种事件：推送、PR变更、全局评论、单行评论
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  # ==========================================
  # [第一关] 代码质量检查 (Push 和 PR 时触发)
  # ==========================================
  mega-check:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: 🛡️ All-in-One Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.12.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.10'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit PySide6
          # 增加容错机制：如果 requirements.txt 中有不兼容 Python 3.12 的库导致报错，不中断流程
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt || echo "⚠️ Warning: Failed to install some requirements, but continuing check..."
          fi

      - name: 🎨 Check Formatting (Ruff)
        if: always() 
        run: ruff format --check .

      - name: 🐛 Lint Code (Ruff)
        if: always()
        run: ruff check --output-format=github .

      - name: 🏷️ Type Checking (Mypy)
        if: always()
        # 将 src/ 改为 . 以扫描根目录下的文件
        run: mypy . --ignore-missing-imports

      - name: 🔒 Security Scan (Bandit)
        if: always()
        # 将 src/ 改为 . 以扫描根目录下的文件，并排除掉隐藏文件夹
        run: bandit -r . -x ./.git,./__pycache__ -ll -i

  # ==========================================
  # [第二关] 物理清场（依赖第一关！检查通过才执行）
  # ==========================================
  fold-everything:
    needs: mega-check # 🚨 核心魔法：只有 mega-check 成功通关，这一步才会启动！
    if: github.event_name == 'pull_request' # 确保仅在 PR 环节清场
    name: 🧹 Fold Old Comments
    runs-on: ubuntu-latest
    steps:
      - name: Fold all existing comments
        uses: actions/github-script@v7
        with:
          # 改用你的最高权限马甲 Token，确保能跨身份折叠任何 AI 的评论
          github-token: ${{ secrets.MY_PERSONAL_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const { owner, repo } = context.repo;
            
            console.log(`[步骤 2: 物理清场] 代码检查已通过，开始清理 PR #${prNumber} ...`);
            const { data: issueComments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({ owner, repo, pull_number: prNumber });

            const allNodeIds = [...issueComments.map(c => c.node_id), ...reviewComments.map(c => c.node_id)];
            if (allNodeIds.length === 0) return;

            // 改用 RESOLVED，它在 GitHub UI 中会将评论折叠得最彻底
            const mutation = `
              mutation($subjectId: ID!) {
                minimizeComment(input: {classifier: RESOLVED, subjectId: $subjectId}) {
                  minimizedComment { isMinimized }
                }
              }
            `;
            
            let successCount = 0;
            for (const id of allNodeIds) {
              try { 
                await github.graphql(mutation, { subjectId: id }); 
                successCount++;
              } catch (e) {
                // 打印真实的报错信息，不再“假装成功”
                console.error(`折叠失败 [节点ID: ${id}]:`, e.message);
              }
            }
            console.log(`[清场完毕] 真实成功折叠了 ${successCount} 条旧评论！`);

  # ==========================================
  # [第三关] 召唤 AI（等清场完毕才入场）
  # ==========================================
  summon-ais:
    needs: fold-everything # 🚨 依赖第二关：清场完毕才召唤
    if: github.event_name == 'pull_request'
    name: 🤖 Summon AI Reviewers
    runs-on: ubuntu-latest
    steps:
      - name: Send commands to wake up AIs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PERSONAL_TOKEN }}
          script: |
            const prNumber = context.issue.number || context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const commands = ["/gemini review", "@sourcery-ai review", "@coderabbitai review"];
            
            console.log(`[步骤 3: 召唤 AI] 战场清理完毕，在 PR #${prNumber} 中召唤 AI...`);
            for (const cmd of commands) {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: cmd });
            }

  # ==========================================
  # [第四关] 狙击手模式（监听 AI 发言并 @jules）
  # ==========================================
  ping-jules:
    # 与前面的串行逻辑无关，属于事件驱动监听器
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      github.event.comment.user.login != 'yeyouyby' && 
      github.event.comment.user.login != 'jules' && 
      github.event.comment.user.login != 'github-actions[bot]'
    name: 🎯 Sniper @jules
    runs-on: ubuntu-latest
    steps:
      - name: Reply to AI and ping @jules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PERSONAL_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const eventName = context.eventName;
            const replyBody = "@jules 代码质量检查已通过，请注意查看并处理这部分 AI 审查意见 👆";
            
            if (eventName === 'issue_comment') {
              const issueNumber = context.payload.issue.number;
              await github.rest.issues.createComment({
                owner: owner, repo: repo, issue_number: issueNumber, body: replyBody
              });
            } else if (eventName === 'pull_request_review_comment') {
              const pullNumber = context.payload.pull_request.number;
              const commentId = context.payload.comment.id;
              await github.rest.pulls.createReplyForReviewComment({
                owner: owner, repo: repo, pull_number: pullNumber, comment_id: commentId, body: replyBody
              });
            }
