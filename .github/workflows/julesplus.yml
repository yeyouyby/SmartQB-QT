name: Ultimate CI/CD & PR Orchestrator

# 监听四种事件：推送、PR变更、全局评论、单行评论
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  # ==========================================
  # [第一关] 代码质量检查 (Push 和 PR 时触发)
  # ==========================================
  mega-check:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: 🛡️ All-in-One Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.12.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.10'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit PySide6

      - name: 🎨 Check Formatting (Ruff)
        if: always() 
        run: ruff format --check .

      - name: 🐛 Lint Code (Ruff)
        if: always()
        run: ruff check --output-format=github .

      - name: 🏷️ Type Checking (Mypy)
        if: always()
        run: mypy . --ignore-missing-imports

      - name: 🔒 Security Scan (Bandit)
        if: always()
        run: bandit -r . -x ./.git,./__pycache__ -ll -i

  # ==========================================
  # [第二关] 物理清场（依赖第一关！检查通过才执行）
  # ==========================================
  fold-everything:
    needs: mega-check
    if: github.event_name == 'pull_request'
    name: 🧹 Fold Old Comments
    runs-on: ubuntu-latest
    steps:
      - name: Fold all existing comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PERSONAL_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const { owner, repo } = context.repo;
            
            console.log(`[步骤 2: 物理清场] 代码检查已通过，开始清理 PR #${prNumber} ...`);
            const { data: issueComments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({ owner, repo, pull_number: prNumber });

            const allNodeIds = [...issueComments.map(c => c.node_id), ...reviewComments.map(c => c.node_id)];
            if (allNodeIds.length === 0) return;

            const mutation = `
              mutation($subjectId: ID!) {
                minimizeComment(input: {classifier: RESOLVED, subjectId: $subjectId}) {
                  minimizedComment { isMinimized }
                }
              }
            `;
            
            let successCount = 0;
            for (const id of allNodeIds) {
              try { 
                await github.graphql(mutation, { subjectId: id }); 
                successCount++;
              } catch (e) {
                console.error(`折叠失败 [节点ID: ${id}]:`, e.message);
              }
            }
            console.log(`[清场完毕] 真实成功折叠了 ${successCount} 条旧评论！`);

  # ==========================================
  # [第三关] 召唤 AI（等清场完毕才入场）
  # ==========================================
  summon-ais:
    needs: fold-everything
    if: github.event_name == 'pull_request'
    name: 🤖 Summon AI Reviewers
    runs-on: ubuntu-latest
    steps:
      - name: Send commands to wake up AIs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PERSONAL_TOKEN }}
          script: |
            const prNumber = context.issue.number || context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            
            const commands = ["/gemini review", "@sourcery-ai guide"];
            
            console.log(`[步骤 3: 召唤 AI] 战场清理完毕，在 PR #${prNumber} 中召唤 AI...`);
            for (const cmd of commands) {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: cmd });
            }

  # ==========================================
  # [第四关] 狙击手模式（带 Kimi K2 智能识别）
  # ==========================================
  ping-jules:
    # 最外层拦截：排除所有白名单，新增对 [bot] 后缀的精准拦截
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      github.event.comment.user.login != 'yeyouyby' && 
      github.event.comment.user.login != 'google-labs-jules' && 
      github.event.comment.user.login != 'google-labs-jules[bot]' && 
      github.event.comment.user.login != 'jules' && 
      github.event.comment.user.login != 'jules[bot]' && 
      github.event.comment.user.login != 'github-actions[bot]'
    name: 🎯 Smart Sniper @jules
    runs-on: ubuntu-latest
    steps:
      - name: Reply to AI and ping @jules
        uses: actions/github-script@v7
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        with:
          github-token: ${{ secrets.MY_PERSONAL_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const eventName = context.eventName;
            const commentBody = context.payload.comment.body;
            const commenter = context.payload.comment.user.login.toLowerCase();
            const nimApiKey = process.env.NVIDIA_API_KEY;
            
            // 纯本地的话术库，用 JS 随机提取，绝对不让大模型“自由发挥”代你写代码回复
            const friendlyMessages = [
              "代码质量检查已通过，请注意查看并处理这部分 AI 审查/指南意见 👆",
              "前置检查已顺利通过，请来看看 AI 刚刚指出的这些细节建议哦 👆",
              "测试与规范扫描全绿！请参阅上方 AI 提供的代码改进指南 👆",
              "自动化门禁已放行，以上是 AI 给出的审查建议，请评估是否需要采纳 👆",
              "基础检查均已通过，请查收这份新鲜出炉的 AI 代码审查报告 👆"
            ];
            const safeMsg = friendlyMessages[Math.floor(Math.random() * friendlyMessages.length)];
            
            // 【终极防线】：排除真实账号及其 [bot] 变体，彻底封死死循环的可能
            const whiteList = ['yeyouyby', 'google-labs-jules', 'google-labs-jules[bot]', 'jules', 'jules[bot]', 'github-actions[bot]'];
            
            if (whiteList.includes(commenter)) {
              if (commentBody.includes("Mock AI Review")) {
                console.log(`[测试模式开启] 检测到包含 "Mock AI Review" 的评论，强制放行白名单人员 ${commenter} 以测试 NIM 模型！`);
              } else {
                console.log(`[防御触发] 检测到评论者是: ${commenter}，属于白名单人员，放弃本次狙击。`);
                return;
              }
            }
            
            // --- NIM Kimi K2 智能识别逻辑开始 ---
            if (nimApiKey) {
              console.log(`正在使用 NVIDIA NIM API (Kimi K2) 分析 ${commenter} 的评论内容...`);
              try {
                const response = await fetch('https://integrate.api.nvidia.com/v1/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${nimApiKey}`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    model: "moonshotai/kimi-k2-instruct-0905",
                    messages: [
                      {
                        role: "system",
                        // 剥夺它生成文字的权限，严密锁定它的输出边界
                        content: "你是一个极其精准的文本分类器。你需要判断以下的 GitHub PR 评论是否包含了实质性的代码审查意见（Code Review）、改进建议或开发指南。\n\n请严格以 JSON 格式输出你的分析结果。格式必须为：\n{\n  \"is_review\": true/false,\n  \"reason\": \"简短的一句话说明判断理由\"\n}\n\n规则如下：\n1. 如果评论中包含具体的代码分析、修改建议、找出的 bug 或开发指导，\"is_review\" 设为 true。\n2. 如果评论仅仅是收到指令的回应（例如'正在为您审阅'）、系统通知或空洞的确认，\"is_review\" 设为 false。\n必须且只能返回合法的 JSON 对象，绝对不要输出任何额外的标记或文字。"
                      },
                      { role: "user", content: commentBody }
                    ],
                    temperature: 0.1, // 恢复冷静，不要做任何联想
                    max_tokens: 512
                  })
                });
                
                if (!response.ok) {
                  const errorText = await response.text();
                  throw new Error(`API 异常报错! 状态码: ${response.status}, 详情: ${errorText}`);
                }
                
                const data = await response.json();
                let llmReply = data.choices[0].message.content.trim();
                console.log(`Kimi K2 原始返回内容: \n${llmReply}`);
                
                // 清洗大模型可能附带的 Markdown 代码块标记 (例如 ```json 和 ```)
                llmReply = llmReply.replace(/^```[a-zA-Z]*\n/, '').replace(/\n```$/, '').trim();
                
                // 解析 JSON
                const resultObj = JSON.parse(llmReply);
                console.log(`✅ JSON 解析成功! 判断结果: ${resultObj.is_review}, 理由: ${resultObj.reason}`);
                
                if (resultObj.is_review !== true) {
                  console.log("拦截成功：AI 判定这是一条无意义的占位/通知评论，跳过 @jules。");
                  return;
                }
              } catch (err) {
                console.error("NVIDIA NIM API 调用或 JSON 解析失败，终止本次任务以免误发通知:", err.message);
                return; 
              }
            } else {
              console.log("未检测到 NVIDIA_API_KEY，跳过智能识别。");
            }
            // --- 智能识别逻辑结束 ---

            // 【完全复刻 GitHub 原生 Quote 机制】：在原文每一行前添加 "> "
            const quotedComment = commentBody.split('\n').map(line => `> ${line}`).join('\n');
            const targetNumber = context.payload.issue ? context.payload.issue.number : context.payload.pull_request.number;
            
            // 将 Quote 部分拼接在你需要发送的话术之上（这里使用 JS 本地绝对安全的随机话术）
            const replyBody = `${quotedComment}\n\n@jules ${safeMsg}`;
            
            // 【模拟真人操作】：生成 1000 到 10000 毫秒（1~10秒）的随机延时
            const delayMs = Math.floor(Math.random() * 9000) + 1000;
            console.log(`[随机延时] 等待 ${delayMs} 毫秒后发送通知，模拟真实操作...`);
            await new Promise(resolve => setTimeout(resolve, delayMs));
            
            // 无论刚才 AI 是在文件里评论，还是在外层评论，我们都在最外层 (Conversation页) 新建一条带 Quote 样式的评论
            await github.rest.issues.createComment({
              owner: owner, 
              repo: repo, 
              issue_number: targetNumber, 
              body: replyBody
            });
            
            console.log(`[狙击成功] 已在 PR #${targetNumber} 的最外层进行原生 Quote 引用并触发了 @jules`);
